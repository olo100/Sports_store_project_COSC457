<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd svg.erDiagram { max-width: 100%; height: auto; }

const dark = matchMedia('(prefers-color-scheme: light)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#000000' : '#000000',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram

  %% Store & Location
  STORE_LOCATION ||--o{ EMPLOYEE : employs
  STORE_LOCATION ||--o{ INVENTORY : stocks
  STORE_LOCATION ||--o{ SALE : processes
  STORE_LOCATION ||--|| MANAGER : "managed by"
  STORE_LOCATION ||--o{ STORE_HOURS : has
  STORE_LOCATION ||--o{ PURCHASE_ORDER : orders
  
  %% Employee & Management
  EMPLOYEE ||--o{ SALE : conducts
  EMPLOYEE }o--|| DEPARTMENT : "assigned to"
  EMPLOYEE }o--|| MANAGER : "reports to"
  EMPLOYEE ||--o{ EMPLOYEE_SCHEDULE : "scheduled in"
  EMPLOYEE ||--o{ TRAINING_RECORD : completes
  EMPLOYEE }o--o| EMPLOYEE : "trains"
  
  MANAGER ||--|| DEPARTMENT : oversees
  
  %% Product Relationships
  PRODUCT ||--o{ INVENTORY : "stocked as"

  PRODUCT }o--|| BRAND : "made by"
  PRODUCT }o--|| SUPPLIER : "supplied by"
  PRODUCT ||--o{ PRODUCT_REVIEW : receives
  PRODUCT ||--o{ PROMOTION : featured_in
  PRODUCT ||--o{ SALE_ITEM : sold_in
  PRODUCT ||--o{ PURCHASE_ORDER_ITEM : ordered_in
  PRODUCT }o--|| SPORT_TYPE : "for sport"
  
  %% Category & Classification
  CATEGORY ||--o{ PRODUCT : contains
  
  SPORT_TYPE ||--o{ PRODUCT : used_for
  SPORT_TYPE ||--o{ TRAINING_RECORD : "training for"
  
  %% Brand & Supplier
  BRAND ||--o{ PRODUCT : manufactures
  
  SUPPLIER ||--o{ PRODUCT : supplies
  SUPPLIER ||--o{ PURCHASE_ORDER : receives
  
  %% Purchasing
  PURCHASE_ORDER ||--o{ PURCHASE_ORDER_ITEM : contains
  PURCHASE_ORDER_ITEM }o--|| PRODUCT : includes
  
  %% Sales
  SALE ||--o{ SALE_ITEM : contains
  SALE }o--|| CUSTOMER : "made by"
  SALE }o--|| PAYMENT_METHOD : "paid via"
  SALE }o--o| PROMOTION : "uses promo"
  SALE }o--o| RETURN_TRANSACTION : returned_via
  
  SALE_ITEM }o--|| PRODUCT : includes
  
  %% Customer
  CUSTOMER ||--o{ SALE : makes
  CUSTOMER ||--o{ LOYALTY_PROGRAM : enrolled_in
  CUSTOMER ||--o{ PRODUCT_REVIEW : writes
  CUSTOMER ||--o{ WISHLIST : maintains
  CUSTOMER ||--o{ ONLINE_ORDER : places
  
  %% Loyalty & Promotions
  LOYALTY_PROGRAM ||--o{ CUSTOMER : rewards
  
  PROMOTION ||--o{ PRODUCT : includes
  PROMOTION ||--o{ SALE : applied_to
  
  %% Inventory
  INVENTORY }o--|| PRODUCT : tracks
  INVENTORY }o--|| STORE_LOCATION : "located at"
  
  %% Reviews & Wishlist
  PRODUCT_REVIEW }o--|| CUSTOMER : "written by"
  PRODUCT_REVIEW }o--|| PRODUCT : "reviews"
  
  WISHLIST }o--|| CUSTOMER : "belongs to"
  WISHLIST ||--o{ WISHLIST_ITEM : contains
  WISHLIST_ITEM }o--|| PRODUCT : includes
  
  %% Online Orders & Shipping
  ONLINE_ORDER }o--|| CUSTOMER : "placed by"
  ONLINE_ORDER }o--|| SHIPMENT : "fulfilled by"
  ONLINE_ORDER ||--o{ ONLINE_ORDER_ITEM : contains
  ONLINE_ORDER_ITEM }o--|| PRODUCT : includes
  
  SHIPMENT ||--o{ ONLINE_ORDER : delivers
  SHIPMENT }o--|| SHIPPING_CARRIER : "shipped via"
  
  SHIPPING_CARRIER ||--o{ SHIPMENT : handles
  
  %% Returns
  RETURN_TRANSACTION }o--|| SALE : "returns from"
  RETURN_TRANSACTION ||--o{ RETURN_ITEM : contains
  RETURN_ITEM }o--|| SALE_ITEM : "returns"
  
  %% Scheduling & Training
  EMPLOYEE_SCHEDULE }o--|| EMPLOYEE : schedules
  EMPLOYEE_SCHEDULE }o--|| STORE_LOCATION : "at location"
  
  TRAINING_RECORD }o--|| EMPLOYEE : "completed by"
  TRAINING_RECORD }o--|| SPORT_TYPE : "training for"
  
  STORE_HOURS }o--|| STORE_LOCATION : "hours for"

  STORE_LOCATION {
    uuid store_id PK
    string store_name

    string phone

  EMPLOYEE {

    uuid department_id FK

  MANAGER {

  }

  DEPARTMENT {

    text description
  }

  PRODUCT {
    uuid product_id PK
    uuid category_id FK
    uuid brand_id FK
    uuid supplier_id FK
    uuid sport_type_id FK
    string name
    string sku
    text description
    decimal price
    decimal cost
    string size
    string color
  }

  CATEGORY {

  }

  BRAND {

  LOYALTY_PROGRAM {

  SHIPPING_CARRIER {

  }
  
  RETURN_TRANSACTION {
    uuid return_id PK

    date return_date
    decimal refund_amount

  RETURN_ITEM {

    uuid return_id FK

  EMPLOYEE_SCHEDULE {
    uuid schedule_id PK
    uuid employee_id FK

    date shift_date

  }
  
  TRAINING_RECORD {
    uuid training_id PK
    uuid employee_id FK
    uuid sport_type_id FK

  SPORT_TYPE {

document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
